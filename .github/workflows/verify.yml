name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lifecycle:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm pack --dry-run
      - run: node dist/src/cli/bin.js --version
      - run: node dist/src/cli/bin.js --help
